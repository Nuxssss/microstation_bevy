- type: entity
  parent: BaseBulletTrigger
  id: KitchenBullet
  name: kitchen bullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: bullet
      shader: unshaded
  - type: SmokeOnTrigger
    duration: 2.1
    spreadAmount: 100
    smokePrototype: Foam
    solution:
      reagents:
      - ReagentId: SpaceCleaner
        Quantity: 1000
  - type: EmitSoundOnTrigger
    sound: /Audio/Items/smoke_grenade_smoke.ogg
    positional: true
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 0.01 # a little pop
    intensitySlope: 1
    maxIntensity: 0.01
    tileBreakScale: 0.01
  - type: Projectile
    damage:
      types:
        Piercing: 16
